services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 384m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY}
      EVENTBRITE_API_KEY: ${EVENTBRITE_API_KEY}
      SEATGEEK_CLIENT_ID: ${SEATGEEK_CLIENT_ID}
      SEATGEEK_CLIENT_SECRET: ${SEATGEEK_CLIENT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_URL: ${BACKEND_URL}
      GEOCODER_BASE_URL: ${GEOCODER_BASE_URL:-https://nominatim.openstreetmap.org/search}
      GEOCODER_USER_AGENT: ${GEOCODER_USER_AGENT:-vancouver-event-map/0.1 (+production)}
      GEOCODER_MIN_INTERVAL_SECONDS: ${GEOCODER_MIN_INTERVAL_SECONDS:-1.0}
    ports:
      - "8000:8000"
    mem_limit: 256m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        BACKEND_URL: ${BACKEND_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL}
    ports:
      - "80:3000"
    mem_limit: 192m

volumes:
  postgres_data:
